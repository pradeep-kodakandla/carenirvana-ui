<div class="leave-dialog" role="dialog" aria-modal="true">

  <!-- Amber warning icon -->
  <div class="leave-dialog__icon-wrap">
    <svg width="28" height="28" viewBox="0 0 20 20" fill="currentColor">
      <path fill-rule="evenodd" d="M8.257 3.099c.765-1.36 2.722-1.36 3.486 0l5.58 9.92c.75 1.334-.213 2.98-1.742 2.98H4.42c-1.53 0-2.493-1.646-1.743-2.98l5.58-9.92zM11 13a1 1 0 11-2 0 1 1 0 012 0zm-1-8a1 1 0 00-1 1v3a1 1 0 002 0V6a1 1 0 00-1-1z" clip-rule="evenodd"/>
    </svg>
  </div>

  <!-- Title -->
  <div class="leave-dialog__title">{{ title }}</div>

  <!-- Message -->
  <div class="leave-dialog__message">{{ message }}</div>

  <!-- Action buttons -->
  <div class="leave-dialog__actions">
    <button type="button" class="leave-dialog__btn leave-dialog__btn--stay" (click)="stay()" cdkFocusInitial>
      {{ cancelText }}
    </button>
    <button type="button" class="leave-dialog__btn leave-dialog__btn--leave" (click)="leave()">
      {{ confirmText }}
    </button>
  </div>

</div>
