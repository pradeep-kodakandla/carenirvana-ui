<mat-drawer-container class="sidenav-container" autosize>
  <mat-drawer-content mode="side" opened>

    <!-- ═══════════════════════════════════════════════════════════════
         WIDGET STRIP  —  single scrollable row, never wraps
         ═══════════════════════════════════════════════════════════════ -->
    <div class="widget-strip-wrapper">

      <!-- Left scroll arrow -->
      <button class="strip-arrow strip-arrow--left"
              *ngIf="canScrollLeft"
              (click)="scrollWidgets('left')"
              aria-label="Scroll left">
        <mat-icon>chevron_left</mat-icon>
      </button>

      <!-- Scrollable row of tiles -->
      <div class="widget-strip"
           #widgetStrip
           (scroll)="onStripScroll(widgetStrip)">

        <!-- Dynamic widgets from role config -->
        <div class="widget-tile"
             *ngFor="let widget of dashboardWidgets; let i = index"
             [ngClass]="{ 'selected': defaultWidget === widget.key }"
             (click)="handleWidgetClick(i + 1, widget.key)">

          <div class="tile-count">{{ getCountForWidget(widget.key) }}</div>
          <div class="tile-footer">
            <span class="tile-label">{{ widget.customLabel }}</span>
            <mat-icon class="tile-icon">{{ getIconForWidget(widget.key) }}</mat-icon>
          </div>
        </div>

        <!-- Static Insights tile -->
        <div class="widget-tile"
             [ngClass]="{ 'selected': defaultWidget === 'insights' }"
             (click)="handleWidgetClick(dashboardWidgets.length + 1, 'insights')">

          <div class="tile-count tile-count--icon">
            <mat-icon class="tile-big-icon">insights</mat-icon>
          </div>
          <div class="tile-footer">
            <span class="tile-label">Insights</span>
            <mat-icon class="tile-icon">insights</mat-icon>
          </div>
        </div>

      </div>

      <!-- Right scroll arrow -->
      <button class="strip-arrow strip-arrow--right"
              *ngIf="canScrollRight"
              (click)="scrollWidgets('right')"
              aria-label="Scroll right">
        <mat-icon>chevron_right</mat-icon>
      </button>

    </div>
    <!-- /widget-strip-wrapper -->

    <div #dynamicContainer></div>

  </mat-drawer-content>
</mat-drawer-container>
