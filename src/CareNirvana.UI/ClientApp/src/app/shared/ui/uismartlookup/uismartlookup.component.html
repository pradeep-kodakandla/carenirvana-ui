<div class="sl-wrap">

  <!-- Label -->
  <label class="sl-label" *ngIf="label" [attr.for]="panelId + '-input'">{{ label }}</label>

  <!-- Input row -->
  <div class="sl-input" [class.isDisabled]="disabled" [class.isOpen]="open">
    <span class="sl-icon" aria-hidden="true">
      <!-- Magnifier SVG — no emoji, scales crisp at any size -->
      <svg width="15" height="15" viewBox="0 0 15 15" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="6.5" cy="6.5" r="5" stroke="currentColor" stroke-width="1.6"/>
        <line x1="10.5" y1="10.5" x2="13.5" y2="13.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
      </svg>
    </span>

    <!-- FIX #5: ARIA attributes for accessibility -->
    <input class="sl-text"
           [id]="panelId + '-input'"
           type="text"
           [formControl]="inputCtrl"
           [attr.placeholder]="placeholder"
           autocomplete="off"
           role="combobox"
           [attr.aria-expanded]="open"
           aria-autocomplete="list"
           [attr.aria-controls]="open ? panelId : null"
           [attr.aria-haspopup]="'listbox'" />

    <button type="button"
            class="sl-clear"
            *ngIf="!disabled && inputCtrl.value"
            (mousedown)="$event.preventDefault()"
            (click)="onClear()"
            aria-label="Clear search">
      <svg width="10" height="10" viewBox="0 0 10 10" fill="none" xmlns="http://www.w3.org/2000/svg">
        <line x1="1" y1="1" x2="9" y2="9" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        <line x1="9" y1="1" x2="1" y2="9" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
      </svg>
    </button>

    <span class="sl-spinner" *ngIf="loading" role="status" aria-label="Searching"></span>
  </div>

  <!-- ── Dropdown panel ────────────────────────────────────────────────────── -->
  <div class="sl-panel"
       [id]="panelId"
       *ngIf="open"
       role="listbox"
       [style.max-height]="maxPanelHeight">

    <!-- Loading state -->
    <div class="sl-status" *ngIf="loading">
      <span class="sl-status-dot"></span>
      Searching…
    </div>

    <!-- FIX #6: use queryLength getter instead of lastQuery -->
    <!-- Empty state -->
    <div class="sl-status sl-status--empty"
         *ngIf="!loading && results.length === 0 && queryLength >= minChars">
      <svg class="sl-empty-icon" width="28" height="28" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="1.5"/>
        <line x1="16" y1="16" x2="21" y2="21" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="8" y1="11" x2="14" y2="11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      No results found
    </div>

    <!-- ── TABLE MODE: columns supplied ──────────────────────────────────── -->
    <ng-container *ngIf="!loading && results.length > 0 && columns.length > 0">
      <table class="sl-table" role="presentation">
        <thead class="sl-thead">
          <tr>
            <th class="sl-th"
                *ngFor="let col of columns"
                [style.flex]="col.flex ?? 1">
              {{ col.header }}
            </th>
          </tr>
        </thead>
        <tbody class="sl-tbody">
          <tr class="sl-tr"
              *ngFor="let item of results; trackBy: trackByIndex"
              role="option"
              tabindex="0"
              (mousedown)="$event.preventDefault()"
              (click)="onPick(item)"
              (keydown.enter)="onPick(item)"
              (keydown.space)="$event.preventDefault(); onPick(item)">
            <td class="sl-td"
                *ngFor="let col of columns"
                [style.flex]="col.flex ?? 1">
              {{ col.cell(item) }}
            </td>
          </tr>
        </tbody>
      </table>

      <div class="sl-footer" *ngIf="results.length >= limit">
        {{ results.length }} results — refine your search for more
      </div>
    </ng-container>

    <!-- ── SINGLE-COLUMN MODE: no columns supplied ────────────────────────── -->
    <ng-container *ngIf="!loading && results.length > 0 && columns.length === 0">
      <button type="button"
              class="sl-item"
              *ngFor="let item of results; trackBy: trackByIndex"
              role="option"
              (mousedown)="$event.preventDefault()"
              (click)="onPick(item)">
        {{ displayWith(item) }}
      </button>

      <div class="sl-footer" *ngIf="results.length >= limit">
        {{ results.length }} results — refine your search for more
      </div>
    </ng-container>

  </div>
</div>
